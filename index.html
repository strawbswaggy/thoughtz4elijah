<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>thoughtz</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url("https://i.pinimg.com/originals/c8/e1/57/c8e15787a56cba7278146d79c93fd7bc.gif");
        background-size: cover;
        color: white;
      }

      /* OVERLAY */
      .overlay {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(
          circle at center,
          rgba(255, 0, 0, 0.15),
          rgba(0, 0, 0, 0.9)
        );
        backdrop-filter: blur(8px);
      }

      .page {
        display: none;
        width: 100%;
      }
      .active {
        display: flex;
        justify-content: center;
      }

      /* CARD */
      .card {
        width: 100%;
        max-width: 650px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 0, 0, 0.4);
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
        text-align: center;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
      }

      /* TITLE */
      h1 {
        margin-bottom: 10px;
        text-shadow: 0 0 10px red;
      }

      /* INPUT */
      input,
      textarea {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border-radius: 10px;
        border: 1px solid #333;
        background: #111;
        color: white;
        transition: 0.2s;
      }

      input:focus,
      textarea:focus {
        border-color: red;
        box-shadow: 0 0 10px red;
      }

      /* BUTTON */
      button {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(45deg, red, #ff4d4d);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.25s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 12px red;
      }

      /* NOTE */
      .note {
        background: rgba(20, 20, 20, 0.9);
        margin-top: 15px;
        padding: 15px;
        border-radius: 12px;
        border-left: 3px solid red;
        text-align: left;
        display: flex;
        flex-direction: column;
      }

      /* REPLY */
      .reply {
        background: #1a1a1a;
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        border-left: 2px solid #555;
        display: flex;
        flex-direction: column;
      }

      /* WRITER SPECIFIC SUB-REPLY */
      .writer-response {
        background: rgba(255, 0, 0, 0.15);
        margin-top: 8px;
        margin-left: 15px;
        padding: 8px;
        border-radius: 8px;
        border-left: 2px solid red;
        display: flex;
        flex-direction: column;
      }

      .reply button, .note button {
        width: auto;
        padding: 5px 10px;
        margin-top: 8px;
        margin-right: 5px;
        font-size: 12px;
      }

      .button-group {
        display: flex;
        flex-wrap: wrap;
      }

      /* ALIGNED TIME STAMP */
      .time-container {
        display: flex;
        justify-content: flex-end;
        width: 100%;
        margin-top: 6px;
      }

      .time {
        font-size: 11px;
        color: #888;
        letter-spacing: 0.3px;
      }

      /* SCROLL */
      #writerNotes,
      #viewerNotes {
        max-height: 320px;
        overflow-y: auto;
      }
    </style>
  </head>

  <body>
    <div class="overlay">
      <div id="passwordPage" class="page active">
        <div class="card">
          <h1>🕷 thoughtz</h1>
          <input
            id="pass"
            type="password"
            placeholder="Enter password (hint bday!)"
          />
          <button onclick="login()">ENTER</button>
        </div>
      </div>

      <div id="modePage" class="page">
        <div class="card">
          <h1>Mode</h1>
          <button onclick="mode('writer')">Writer</button>
          <button onclick="mode('viewer')">Viewer</button>
        </div>
      </div>

      <div id="writerPage" class="page">
        <div class="card">
          <h1>Writer Dashboard</h1>
          <textarea id="noteInput" placeholder="What's on your mind?"></textarea>
          <button onclick="addNote()">Post Note</button>
          <button onclick="back()">Back</button>
          <div id="writerNotes"></div>
        </div>
      </div>

      <div id="viewerPage" class="page">
        <div class="card">
          <h1>Viewer Feed</h1>
          <button onclick="back()">Back</button>
          <div id="viewerNotes"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        updateDoc,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDTlahuS9_JdyMuBA4_vGpRaYK7l04xc1Y",
        authDomain: "thoughtz-36311.firebaseapp.com",
        projectId: "thoughtz-36311",
        storageBucket: "thoughtz-36311.firebasestorage.app",
        messagingSenderId: "987082044864",
        appId: "1:987082044864:web:1cc521d2cfc894c6eac425",
        measurementId: "G-J9M5GWLVX0",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const notesRef = collection(db, "notes");

      const PASS = "0420";
      let notes = [];

      /* HELPER: GET CLEAN STANDARD DATE STRING WITH SECONDS INCLUDED */
      function getFormattedDate() {
        const now = new Date();
        const options = { year: 'numeric', month: 'short', day: '2-digit' };
        const datePart = now.toLocaleDateString('en-US', options);
        
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        
        return `${datePart} • ${hours}:${minutes}:${seconds} ${ampm}`;
      }

      /* UI CONTROL */
      window.show = (p) => {
        document
          .querySelectorAll(".page")
          .forEach((x) => x.classList.remove("active"));
        document.getElementById(p).classList.add("active");
      };

      window.login = () => {
        if (document.getElementById("pass").value === PASS) {
          show("modePage");
        } else alert("Wrong password");
      };

      window.mode = (m) => {
        show(m === "writer" ? "writerPage" : "viewerPage");
      };

      window.back = () => show("modePage");

      /* REALTIME DATABASE SYNC */
      onSnapshot(notesRef, (snap) => {
        notes = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        loadWriter();
        loadViewer();
      });

      /* ADD NOTE */
      window.addNote = async () => {
        let text = document.getElementById("noteInput").value.trim();
        if (!text) return;

        await addDoc(notesRef, {
          text,
          time: getFormattedDate(),
          timestamp: Date.now(),
          replies: [],
        });

        document.getElementById("noteInput").value = "";
      };

      /* NOTE ACTIONS */
      window.deleteNote = async (id) => {
        await deleteDoc(doc(db, "notes", id));
      };

      window.editNote = async (id, old) => {
        let t = prompt("Edit note text:", old);
        if (!t) return;
        await updateDoc(doc(db, "notes", id), { text: t });
      };

      /* VIEWER ADDS REPLY */
      window.addReply = async (id) => {
        let txt = document.getElementById("r" + id).value.trim();
        if (!txt) return;

        let n = notes.find(note => note.id === id);
        if (!n) return;

        n.replies.push({
          text: txt,
          time: getFormattedDate(),
          writerReply: "",
          writerTime: ""
        });

        await updateDoc(doc(db, "notes", id), {
          replies: n.replies,
        });

        document.getElementById("r" + id).value = "";
      };

      /* WRITER ADDS/EDITS REPLY TO VIEWER */
      window.addWriterReply = async (noteId, replyIndex) => {
        let n = notes.find(note => note.id === noteId);
        if (!n) return;

        let currentReply = n.replies[replyIndex].writerReply || "";
        
        let txt = prompt("Write your response:", currentReply);
        if (txt === null) return; 
        txt = txt.trim();

        n.replies[replyIndex].writerReply = txt;
        n.replies[replyIndex].writerTime = getFormattedDate();

        await updateDoc(doc(db, "notes", noteId), {
          replies: n.replies
        });
      };

      /* WRITER DELETES RESPONSES TO VIEWER */
      window.deleteWriterReply = async (noteId, replyIndex) => {
        let n = notes.find(note => note.id === noteId);
        if (!n) return;

        n.replies[replyIndex].writerReply = "";
        n.replies[replyIndex].writerTime = "";

        await updateDoc(doc(db, "notes", noteId), {
          replies: n.replies
        });
      };

      /* EDIT VIEWER REPLY */
      window.editReply = async (noteId, replyIndex) => {
        let n = notes.find(note => note.id === noteId);
        if (!n) return;

        let old = n.replies[replyIndex].text;
        let updated = prompt("Edit reply:", old);
        if (!updated) return;

        n.replies[replyIndex].text = updated;

        await updateDoc(doc(db, "notes", noteId), {
          replies: n.replies,
        });
      };

      /* DELETE VIEWER REPLY */
      window.deleteReply = async (noteId, replyIndex) => {
        let n = notes.find(note => note.id === noteId);
        if (!n) return;

        n.replies.splice(replyIndex, 1);

        await updateDoc(doc(db, "notes", noteId), {
          replies: n.replies,
        });
      };

      /* RENDERING THE WRITER SCREEN (SORTED LATEST FIRST) */
      function loadWriter() {
        let c = document.getElementById("writerNotes");
        c.innerHTML = "";

        let displayNotes = [...notes].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        displayNotes.forEach((n) => {
          let replies = n.replies
            .map((r, ri) => {
              let writerResponseMarkup = r.writerReply 
                ? `<div class="writer-response">
                     <span>${r.writerReply.replace(/\n/g, '<br>')}</span>
                     <div class="time-container"><span class="time">${r.writerTime || n.time}</span></div>
                     <div class="button-group">
                       <button onclick="addWriterReply('${n.id}', ${ri})">Edit Response</button>
                       <button onclick="deleteWriterReply('${n.id}', ${ri})">Delete Response</button>
                     </div>
                   </div>`
                : `<div class="button-group"><button onclick="addWriterReply('${n.id}', ${ri})">Reply</button></div>`;

              return `
                <div class="reply">
                  <span>${r.text}</span>
                  <div class="time-container"><span class="time">${r.time}</span></div>
                  ${writerResponseMarkup}
                </div>
              `;
            })
            .join("");

          c.innerHTML += `
            <div class="note">
              <h3>${n.text.replace(/\n/g, '<br>')}</h3>
              <div class="time-container"><span class="time">${n.time}</span></div>

              <div class="button-group" style="margin-top: 5px;">
                <button onclick="editNote('${n.id}',\`${n.text}\`)">Edit Note</button>
                <button onclick="deleteNote('${n.id}')">Delete Note</button>
              </div>

              ${replies}
            </div>`;
        });
      }

      /* RENDERING THE VIEWER FEED SCREEN (SORTED LATEST FIRST) */
      function loadViewer() {
        let c = document.getElementById("viewerNotes");
        c.innerHTML = "";

        let displayNotes = [...notes].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        displayNotes.forEach((n) => {
          let replies = n.replies
            .map((r, ri) => {
              let writerResponseMarkup = r.writerReply 
                ? `<div class="writer-response">
                     <span>${r.writerReply.replace(/\n/g, '<br>')}</span>
                     <div class="time-container"><span class="time">${r.writerTime || n.time}</span></div>
                   </div>`
                : '';

              return `
                <div class="reply">
                  <span>${r.text}</span>
                  <div class="time-container"><span class="time">${r.time}</span></div>

                  <div class="button-group">
                    <button onclick="editReply('${n.id}',${ri})">Edit</button>
                    <button onclick="deleteReply('${n.id}',${ri})">Delete</button>
                  </div>
                  
                  ${writerResponseMarkup}
                </div>
              `;
            })
            .join("");

          c.innerHTML += `
            <div class="note">
              <h3>${n.text.replace(/\n/g, '<br>')}</h3>
              <div class="time-container"><span class="time">${n.time}</span></div>

              <input id="r${n.id}" placeholder="Leave a thought...">
              <div class="button-group"><button onclick="addReply('${n.id}')">Comment</button></div>

              ${replies}
            </div>`;
        });
      }
    </script>
  </body>
</html>
